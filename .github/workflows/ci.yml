name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }}${{ matrix.wp != 'latest' && format( ' (WP {0})', matrix.wp ) || '' }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.3'
          - '8.2'
          - '8.1'
          - '8.0'
          - '7.4'
          - '7.3'
          - '7.2'
        wp:
          - latest
        include:
          - php: '7.2'
            wp: '6.9'

    env:
      WP_ENV_PHP_VERSION: ${{ matrix.php }}
      WP_ENV_CORE: ${{ format( 'https://wordpress.org/wordpress-{0}.zip', matrix.wp ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Start Docker environment
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm run env start

      - name: Install Composer dependencies
        run: npm run composer install

      - name: Versions
        run: |
          npm run env run tests-cli php -- -v
          npm run env run tests-cli wp core version

      - name: Run tests
        run: npm run test

  coding-standards:
    name: Coding Standards
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sodium
          coverage: none
          tools: composer, cs2pr

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check coding standards
        if: hashFiles('phpcs.xml.dist') != '' || hashFiles('.phpcs.xml.dist') != ''
        run: vendor/bin/phpcs --report-full --report-checkstyle=./phpcs-report.xml || true

      - name: Annotate PHPCS results
        if: hashFiles('phpcs-report.xml') != ''
        run: cs2pr phpcs-report.xml
